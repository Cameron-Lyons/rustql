name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always
  RUSTQL_MSRV: "1.88.0"

jobs:
  checks:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Install stable toolchain with rustfmt and clippy
      run: rustup component add rustfmt clippy
    - name: Install MSRV toolchain
      run: rustup toolchain install "${RUSTQL_MSRV}" --profile minimal
    - name: MSRV check
      run: cargo +"${RUSTQL_MSRV}" check --workspace --all-targets --all-features
    - name: Format check
      run: cargo fmt --all -- --check
    - name: Clippy (deny warnings)
      run: cargo clippy --workspace --all-targets --all-features -- -D warnings
    - name: Build
      run: cargo build --workspace --all-targets --all-features --verbose
    - name: Run tests
      run: cargo test --workspace --all-features --verbose
    - name: Run benchmark smoke profile
      run: cargo bench --bench engine -- --profile smoke --samples 1 --warmup 0
