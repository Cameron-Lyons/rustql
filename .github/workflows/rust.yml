name: Rust

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Check formatting
      run: cargo fmt --all -- --check
    - name: Run clippy
      run: cargo clippy --all-targets -- -D warnings

  test:

    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        storage: [json, btree]

    env:
      RUSTQL_STORAGE: ${{ matrix.storage }}

    steps:
    - uses: actions/checkout@v4
    - name: Run tests
      run: cargo test --verbose
    - name: Run CLI smoke
      run: |
        rm -f rustql_data.json rustql_btree.dat rustql_btree.dat.wal
        output="$(printf "CREATE TABLE ci_smoke (id INTEGER); INSERT INTO ci_smoke VALUES (42); SELECT id FROM ci_smoke;" | cargo run --quiet)"
        echo "$output"
        grep -q "42" <<< "$output"
